<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 80" fill="none">
  <!-- Blade — tapers from crossguard to point -->
  <path
    d="M20 8 L23 52 L20 72 L17 52 Z"
    fill="currentColor"
    opacity="0.95"
  />
  <!-- Crossguard — single horizontal bar -->
  <rect
    x="8"
    y="22"
    width="24"
    height="2.5"
    rx="1"
    fill="currentColor"
    opacity="0.85"
  />
  <!-- Grip — narrow rectangle above crossguard -->
  <rect
    x="18"
    y="8"
    width="4"
    height="14"
    rx="1"
    fill="currentColor"
    opacity="0.7"
  />
  <!-- Pommel — small circle at top -->
  <circle
    cx="20"
    cy="6"
    r="3.5"
    fill="currentColor"
    opacity="0.8"
  />
</svg>
